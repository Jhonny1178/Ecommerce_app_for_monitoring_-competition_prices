<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Złóż wniosek o założenie konta</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; padding: 40px; }
        .auth-container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9em; }
        input[type="text"], input[type="email"], input[type="url"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .btn { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 1em; font-weight: bold; }
        .btn:hover { background-color: #0056b3; }
        .alert { padding: 10px; border-radius: 4px; margin-bottom: 20px; font-size: 0.9em; }
        .alert-error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .alert-success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .url-group { background: #f8f9fa; padding: 15px; border-radius: 6px; border: 1px solid #eee; margin-top: 10px; }
        .url-group h4 { margin-top: 0; font-size: 0.9em; color: #555; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="auth-container">
    <h2>Wniosek o dostęp</h2>
    <p style="font-size: 0.85em; color: #666;">Zostaw nam swoje dane, a my przeanalizujemy rynek i przygotujemy dla Ciebie konto.</p>

    {% if error %}
        <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    {% if message %}
        <div class="alert alert-success">{{ message }}</div>
    {% else %}
        <form method="POST" action="/register">
            <div class="form-group">
                <label for="company_name">Nazwa firmy / Sklepu *</label>
                <input type="text" id="company_name" name="company_name" required placeholder="np. Sklep Górski Sp. z o.o.">
            </div>

            <div class="form-group">
                <label for="email">Adres E-mail *</label>
                <input type="email" id="email" name="email" required placeholder="kontakt@twojfirma.pl">
            </div>

            <div class="url-group">
                <h4>Strony konkurencji do monitorowania (max 5)</h4>

                <div class="form-group">
                    <label>Strona główna konkurenta 1 *</label>
                    <input type="url" name="url_1" required placeholder="https://konkurencja.pl">
                </div>
                <div class="form-group">
                    <label>Strona konkurenta 2</label>
                    <input type="url" name="url_2" placeholder="https://inny-sklep.pl">
                </div>
                <div class="form-group">
                    <label>Strona konkurenta 3</label>
                    <input type="url" name="url_3">
                </div>
                <div class="form-group">
                    <label>Strona konkurenta 4</label>
                    <input type="url" name="url_4">
                </div>
                <div class="form-group">
                    <label>Strona konkurenta 5</label>
                    <input type="url" name="url_5">
                </div>
            </div>

            <button type="submit" class="btn">Wyślij wniosek</button>
        </form>
    {% endif %}

    <p style="text-align: center; margin-top: 20px; font-size: 0.85em;">
        Masz już konto? <a href="/login">Zaloguj się</a>
    </p>
</div>

</body>
</html>
