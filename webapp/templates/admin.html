<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin – Panel Analityczny</title>
<link rel="stylesheet" href="../static/admin.css">
</head>
<body>

<nav>
  <div class="nav-logo">Analityka</div>
  <div class="nav-sub">Panel zarządzania</div>
  <a href="/dashboard">Dashboard</a>
  <a href="/admin" class="active">Admin</a>
  <div class="nav-spacer"></div>
  <div class="nav-user">
    <strong>{{ username }}</strong>
    <span style="color:var(--accent);font-size:.68rem;">ADMIN</span>
    <br><br>
    <a href="/logout" style="color:var(--error)">Wyloguj →</a>
  </div>
</nav>

<main>
  <h1>Panel administratora</h1>
  <p class="page-sub">Dodawaj, edytuj i usuwaj produkty w bazie danych</p>

  <div class="admin-grid">

    <!-- FORM -->
    <div class="form-card">
      <span class="mode-label mode-add" id="modeLabel">Nowy produkt</span>
      <h2 id="formTitle">Dodaj produkt</h2>
      <input type="hidden" id="editId">

      <label>SKU</label>
      <input type="text" id="fSku" placeholder="np. MAT-160-WH">

      <label>Nazwa produktu</label>
      <input type="text" id="fName" placeholder="np. Materac Premium 160x200">

      <label>Kategoria</label>
      <input type="text" id="fCategory" placeholder="np. Materace">

      <label>Rozmiar</label>
      <input type="text" id="fSize" placeholder="np. 160x200">

      <label>Kolor</label>
      <input type="text" id="fColor" placeholder="np. Biały">

      <label>Producent</label>
      <input type="text" id="fManufacturer" placeholder="np. SleepMaster">

      <label>Sklep</label>
      <input type="text" id="fStore" placeholder="np. Ikea">

      <label>Cena normalna (zł)</label>
      <input type="number" id="fPriceNormal" placeholder="0.00" step="0.01" min="0">

      <label>Cena promocyjna (zł)</label>
      <input type="number" id="fPriceSpecial" placeholder="0.00" step="0.01" min="0">

      <label>Dostępność</label>
      <select id="fAvailability">
        <option value="">— wybierz —</option>
        <option value="Dostępny">Dostępny</option>
        <option value="Mało">Mało</option>
        <option value="Niedostępny">Niedostępny</option>
      </select>

      <label>URL produktu</label>
      <input type="text" id="fUrl" placeholder="https://…">

      <label>URL obrazka</label>
      <input type="text" id="fImage" placeholder="https://…">

      <label>Opis</label>
      <textarea id="fDescription" rows="3" placeholder="Krótki opis produktu…" style="width:100%;box-sizing:border-box;border:1px solid var(--border);color:var(--text);border-radius:6px;padding:8px 10px;font-size:.85rem;resize:vertical"></textarea>

      <div class="btn-row">
        <button class="btn" onclick="submitForm()">Zapisz</button>
        <button class="btn-ghost" onclick="resetForm()">Anuluj</button>
      </div>
    </div>

    <!-- TABLE -->
    <div class="table-card">
      <div class="table-header">
        <h2>Produkty</h2>
        <input class="search-box" id="search" type="text" placeholder="Szukaj…" oninput="filterTable()">
      </div>
      <div id="tableWrap"><div class="spinner">Ładowanie…</div></div>
    </div>

  </div>
</main>

<div class="toast" id="toast"></div>

<script>
let allProducts = [];

async function loadProducts() {
  const r    = await fetch('/api/products?sort=id&order=desc');
  const json = await r.json();
  if (!json.ok) { showToast('Błąd ładowania: ' + json.error, 'err'); return; }
  allProducts = json.data;
  filterTable();
}

function filterTable() {
  const q = document.getElementById('search').value.toLowerCase();
  const rows = q
    ? allProducts.filter(p =>
        (p.name     ?? '').toLowerCase().includes(q) ||
        (p.sku      ?? '').toLowerCase().includes(q) ||
        (p.category ?? '').toLowerCase().includes(q) ||
        (p.store    ?? '').toLowerCase().includes(q)
      )
    : allProducts;
  renderTable(rows);
}

function renderTable(rows) {
  if (!rows.length) {
    document.getElementById('tableWrap').innerHTML = '<p style="text-align:center;color:var(--muted);padding:32px">Brak wyników.</p>';
    return;
  }
  let html = `<table><thead><tr>
    <th>ID</th><th>SKU</th><th>Nazwa</th><th>Kategoria</th><th>Sklep</th>
    <th>Cena norm.</th><th>Cena prom.</th><th>Dostępność</th><th>Akcje</th>
  </tr></thead><tbody>`;
  rows.forEach(p => {
    const safeName = (p.name ?? '').replace(/'/g, "\\'");
    const availColor = p.availability === 'Dostępny' ? 'var(--accent)' : p.availability === 'Mało' ? '#ffe66d' : 'var(--error)';
    html += `<tr id="row-${p.id}">
      <td style="color:var(--muted)">#${p.id}</td>
      <td style="font-size:.72rem;color:var(--muted)">${p.sku ?? '—'}</td>
      <td>${p.name ?? '-'}</td>
      <td><span class="badge">${p.category ?? '—'}</span></td>
      <td>${p.store ?? '-'}</td>
      <td class="price-cell">${p.price_normal != null ? parseFloat(p.price_normal).toFixed(2) + ' zł' : '—'}</td>
      <td class="price-cell">${p.price_special != null ? parseFloat(p.price_special).toFixed(2) + ' zł' : '—'}</td>
      <td style="color:${availColor}">${p.availability ?? '—'}</td>
      <td>
        <button class="action-btn" onclick="editProduct(${p.id})">Edytuj</button>
        <button class="action-btn del" onclick="deleteProduct(${p.id}, '${safeName}')">Usuń</button>
      </td>
    </tr>`;
  });
  html += '</tbody></table>';
  document.getElementById('tableWrap').innerHTML = html;
}

function editProduct(id) {
  const p = allProducts.find(x => x.id === id);
  if (!p) return;
  document.getElementById('editId').value        = p.id;
  document.getElementById('fSku').value          = p.sku          ?? '';
  document.getElementById('fName').value         = p.name         ?? '';
  document.getElementById('fCategory').value     = p.category     ?? '';
  document.getElementById('fSize').value         = p.size         ?? '';
  document.getElementById('fColor').value        = p.color        ?? '';
  document.getElementById('fManufacturer').value = p.manufacturer ?? '';
  document.getElementById('fStore').value        = p.store        ?? '';
  document.getElementById('fPriceNormal').value  = p.price_normal  != null ? parseFloat(p.price_normal).toFixed(2)  : '';
  document.getElementById('fPriceSpecial').value = p.price_special != null ? parseFloat(p.price_special).toFixed(2) : '';
  document.getElementById('fAvailability').value = p.availability ?? '';
  document.getElementById('fUrl').value          = p.url          ?? '';
  document.getElementById('fImage').value        = p.image        ?? '';
  document.getElementById('fDescription').value  = p.description  ?? '';
  document.getElementById('formTitle').textContent = 'Edytuj produkt';
  document.getElementById('modeLabel').textContent = '✏ Edycja';
  document.getElementById('modeLabel').className   = 'mode-label mode-edit';
  document.querySelectorAll('.editing-row').forEach(r => r.classList.remove('editing-row'));
  const row = document.getElementById('row-' + id);
  if (row) row.classList.add('editing-row');
}

function resetForm() {
  ['editId','fSku','fName','fCategory','fSize','fColor','fManufacturer',
   'fStore','fPriceNormal','fPriceSpecial','fUrl','fImage','fDescription']
    .forEach(id => document.getElementById(id).value = '');
  document.getElementById('fAvailability').value  = '';
  document.getElementById('formTitle').textContent = 'Dodaj produkt';
  document.getElementById('modeLabel').textContent = 'Nowy produkt';
  document.getElementById('modeLabel').className   = 'mode-label mode-add';
  document.querySelectorAll('.editing-row').forEach(r => r.classList.remove('editing-row'));
}

async function submitForm() {
  const id = document.getElementById('editId').value;
  const payload = {
    sku:           document.getElementById('fSku').value.trim(),
    name:          document.getElementById('fName').value.trim(),
    category:      document.getElementById('fCategory').value.trim(),
    size:          document.getElementById('fSize').value.trim(),
    color:         document.getElementById('fColor').value.trim(),
    manufacturer:  document.getElementById('fManufacturer').value.trim(),
    store:         document.getElementById('fStore').value.trim(),
    price_normal:  document.getElementById('fPriceNormal').value,
    price_special: document.getElementById('fPriceSpecial').value,
    availability:  document.getElementById('fAvailability').value,
    url:           document.getElementById('fUrl').value.trim(),
    image:         document.getElementById('fImage').value.trim(),
    description:   document.getElementById('fDescription').value.trim(),
  };

  if (!payload.name) { showToast('Nazwa produktu jest wymagana.', 'err'); return; }

  try {
    let url    = '/api/admin/product';
    let method = 'POST';
    if (id) { url += '/' + id; method = 'PUT'; }
    const r    = await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
    const json = await r.json();
    if (json.ok) {
      showToast(id ? 'Produkt zaktualizowany ✓' : 'Produkt dodany ✓', 'ok');
      resetForm(); loadProducts();
    } else {
      showToast('Błąd: ' + json.error, 'err');
    }
  } catch(e) { showToast('Błąd sieci: ' + e, 'err'); }
}

async function deleteProduct(id, name) {
  if (!confirm(`Usunąć produkt „${name}"?`)) return;
  try {
    const r    = await fetch('/api/admin/product/' + id, { method: 'DELETE' });
    const json = await r.json();
    if (json.ok) { showToast('Usunięto ✓', 'ok'); loadProducts(); }
    else showToast('Błąd: ' + json.error, 'err');
  } catch(e) { showToast('Błąd sieci: ' + e, 'err'); }
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + (type || '');
  setTimeout(() => { t.className = 'toast'; }, 3000);
}

loadProducts();
</script>
</body>
</html>
